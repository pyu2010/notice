<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수행평가 안내</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* 기본 스타일 초기화 및 배경 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            text-align: center; 
            background-color: #000; 
            color: #fff; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh; /* 화면 높이에 꽉 차게 설정 */
            padding: 20px;
        }

        #title { 
            font-size: 1.5rem; /* 모바일 대응 가변 크기 */
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #ccc;
        }

        #subtitle { 
            font-size: 1.2rem; 
            margin-bottom: 40px; 
            word-break: keep-all; /* 단어 단위 줄바꿈 */
        }

        #d-day { 
            font-size: 3.5rem; /* 강조를 위해 크게 설정 */
            font-weight: 900; 
            letter-spacing: -1px;
            transition: color 0.5s ease; /* 색상 변경 시 부드럽게 */
        }

        /* 작은 화면 기기 대응 (아이폰 SE 등) */
        @media (max-width: 350px) {
            #title { font-size: 1.2rem; }
            #d-day { font-size: 2.8rem; }
        }
    </style>
</head>
<body>
    <div id="title">수행평가 안내</div>
    <div id="subtitle">- XX 수행평가</div>
    <div id="d-day">D-Day 계산 중...</div>

    <script>
        $(document).ready(function() {
            // 목표 날짜 설정
            const targetDate = new Date("2026-03-16T00:00:00");

            function updateDisplay() {
                const now = new Date();
                const diff = targetDate - now;

                if (diff <= 0) {
                    $('#d-day').text("D-DAY 종료");
                    $('#d-day').css('color', '#ff4d4d');
                    return;
                }

                // 남은 일수 계산
                const dDay = Math.ceil(diff / (1000 * 60 * 60 * 24));

                // 텍스트 업데이트 (D-Day 0은 당일을 의미)
                $('#d-day').text(dDay === 0 ? "D-Day" : `D-${dDay}`);

                // 1일 남았을 때(내일이 시험일 때)부터 붉은색 표시
                if (dDay <= 1) {
                    $('#d-day').css('color', '#ff4d4d');
                } else {
                    $('#d-day').css('color', '#fff');
                }
            }

            updateDisplay();
            setInterval(updateDisplay, 1000);
        });
    </script>
</body>
</html>
