<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>수행평가 안내</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* 기본 스타일 초기화 및 배경 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            background-color: #000; 
            color: #fff; 
            height: 100vh;
            display: flex;
            flex-direction: column; /* 세로 방향 레이아웃 */
            overflow: hidden; /* 스크롤 방지 */
        }

        /* 상단 고정 영역 */
        header {
            padding: 20px;
            text-align: center;
        }

        #title { 
            font-size: 1.5rem;
            font-weight: bold; 
            color: #ccc;
        }

        /* 중앙 정렬 영역 */
        .main-content {
            flex: 1; /* 남은 공간을 모두 차지 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 수직 중앙 정렬 */
            align-items: center; /* 수평 중앙 정렬 */
            text-align: center;
            padding-bottom: 60px; /* 시각적 균형을 위해 살짝 위로 올림 */
        }

        #subtitle { 
            font-size: 1.2rem; 
            margin-bottom: 20px; 
            word-break: keep-all;
            color: #aaa;
        }

        #d-day { 
            font-size: 4rem; 
            font-weight: 900; 
            letter-spacing: -2px;
            transition: color 0.5s ease;
        }

        /* 작은 화면 기기 대응 */
        @media (max-width: 350px) {
            #title { font-size: 1.2rem; }
            #d-day { font-size: 3rem; }
            #subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <div id="title">수행평가 안내</div>
    </header>

    <div class="main-content">
        <div id="subtitle">- 영어 수행평가</div>
        <div id="d-day">D-Day 계산 중...</div>
    </div>

    <script>
        $(document).ready(function() {
            // 목표 날짜 설정
            const targetDate = new Date("2026-03-16T00:00:00");

            function updateDisplay() {
                const now = new Date();
                const diff = targetDate - now;

                if (diff <= 0) {
                    $('#d-day').text("D-DAY 종료");
                    $('#d-day').css('color', '#ff4d4d');
                    return;
                }

                // 남은 일수 계산
                const dDay = Math.ceil(diff / (1000 * 60 * 60 * 24));

                // 텍스트 업데이트
                $('#d-day').text(dDay === 0 ? "D-Day" : `D-${dDay}`);

                // 1일 남았을 때부터 붉은색 표시
                if (dDay <= 1) {
                    $('#d-day').css('color', 'red');
                } else {
                    $('#d-day').css('color', 'yellow');
                }
            }

            updateDisplay();
            setInterval(updateDisplay, 1000);
        });
    </script>
</body>
</html>
