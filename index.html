<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta property="og:title" content="수행평가 D-day 확인">
<meta property="og:description" content="남은 시간을 확인하세요">
<meta property="og:type" content="website">
<meta property="og:url" content="https://pyu2010.github.io/notice/">
<meta property="og:image" content="https://pyu2010.github.io/notice/notice_img.png">
<title>수행평가 안내 </title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body{
    font-family:'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background:#000;
    color:#fff;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    padding:20px;
    text-align:center;
}

#title{
    font-size:1.5rem;
    font-weight:bold;
    color:#ccc;
}

.main-content{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.event{
    margin:15px 0;
    text-align:center;
}

.subtitle{
    font-size:1.2rem;
    color:#aaa;
    margin-bottom:5px;
}

.d-day{
    font-size:3rem;
    font-weight:900;
}

</style>
</head>

<body>

<header>
<div id="title">수행평가 안내</div>
</header>

<div class="main-content" id="eventList">
</div>


<script>

$(document).ready(function(){

    // ====== 여기에 수행평가 추가 ======
    const events = [
        { title: "영어 수행평가(단어)", date: "2026-03-25T00:00:00" },
        { title: "음악 수행평가(리듬 연주)", date: "2026-03-26T00:00:00" },{ title: "통합사회A 수행평가(1차시)", date: "2026-03-30T00:00:00" },{ title: "통합사회A 수행평가(2차시)", date: "2026-04-01T00:00:00" }
    ];
    // ===============================


    // 화면 생성
    events.forEach((event,i)=>{

        $("#eventList").append(`
            <div class="event" id="event${i}">
                <div class="subtitle">--- ${event.title} ---</div>
                <div class="d-day">계산중...</div>
            </div>
        `);

    });


    function updateDisplay(){

        const now = new Date();

        events.forEach((event,i)=>{

            const targetDate = new Date(event.date);
            const diff = targetDate - now;

            const ddayElement = $(`#event${i} .d-day`);

            if(diff <= 0){

                ddayElement.text("D-DAY");
                ddayElement.css("color","#ff4d4d");
                return;

            }

            const dDay = Math.ceil(diff / (1000*60*60*24));

            ddayElement.text(`D-${dDay}`);

            if(dDay <= 1){
                ddayElement.css("color","red");
            }else{
                ddayElement.css("color","yellow");
            }

        });

    }

    updateDisplay();
    setInterval(updateDisplay,1000);

});

</script>

</body>
</html>
