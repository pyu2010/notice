<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>수행평가 안내</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* 배경 검정, 글자 흰색 설정 */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding-top: 50px; 
            background-color: #000; 
            color: #fff; 
        }
        #title { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        #subtitle { font-size: 24px; margin-bottom: 20px; }
        /* 초기 d-day 색상은 흰색으로 설정 */
        #d-day { font-size: 24px; font-weight: bold; color: #fff; }
    </style>
</head>
<body>
    <div id="title">[ 수행평가 안내 ]</div><br><br>
    <div id="subtitle">- XX 수행평가</div>
    <div id="d-day">목표일까지 남은 시간 계산 중...</div>

    <script>
        $(document).ready(function() {
            const targetDate = new Date("2026-04-14T00:00:00");		// 목표 날짜 설정

            function updateDisplay() {
                const now = new Date();
                const diff = targetDate - now; // 밀리초 단위 차이

                if (diff <= 0) {
                    $('#d-day').text("D-Day 목표 날짜가 지났습니다!");
                    $('#d-day').css('color', '#ff4d4d'); // 종료 시 붉은색 유지
                    return;
                }

                // 남은 일수 계산
                const dDay = Math.floor(diff / (1000 * 60 * 60 * 24));

                // 텍스트 업데이트
                $('#d-day').text(`D-Day ${dDay}`);

                // 조건부 색상 변경: 1일 이하로 남았을 때 붉은색, 그 외 흰색
                if (dDay <= 1) {
                    $('#d-day').css('color', '#ff4d4d'); // 붉은색 (가독성을 위해 살짝 밝은 레드)
                } else {
                    $('#d-day').css('color', '#fff');    // 흰색
                }
            }

            // 초기 실행 및 1초 주기 반복
            updateDisplay();
            setInterval(updateDisplay, 1000);
        });
    </script>
</body>
</html>
